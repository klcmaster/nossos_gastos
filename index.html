<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Financeiro Pro - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">

</head>
<body class="antialiased overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#1e293b] transform -translate-x-full transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0 border-r border-slate-800">
            <div class="p-6 flex justify-between items-center">
                <h1 class="text-xl font-bold text-blue-500 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Nosso Financeiro
                </h1>
                <button onclick="toggleSidebar(false)" class="lg:hidden text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <nav class="mt-4 px-4 space-y-2">
                <button onclick="navigateTo('add-transaction')" id="nav-add-transaction" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    Novo Lançamento
                </button>
                <button onclick="navigateTo('history')" id="nav-history" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    Histórico
                </button>
                <button onclick="navigateTo('summary')" id="nav-summary" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    Resumo por Pessoa
                </button>
                <button onclick="navigateTo('persons')" id="nav-persons" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    Gerenciar Pessoas
                </button>
            </nav>

            <div class="absolute bottom-6 left-6 text-xs text-slate-500">
                v2.2 • Dark Mode
            </div>
        </aside>

        <!-- Overlay for Mobile -->
        <div id="sidebar-overlay" onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/50 z-40 lg:hidden shadow-inner"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 bg-[#0f172a] relative">
            
            <!-- Mobile Header -->
            <header class="lg:hidden bg-[#1e293b] p-4 flex items-center justify-between border-b border-slate-800 shadow-md z-30">
                <button onclick="toggleSidebar(true)" class="p-2 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <span class="font-bold text-blue-500">Financeiro Pro</span>
                <div class="w-10"></div>
            </header>

            <!-- Pages Area -->
            <main class="flex-1 overflow-y-auto p-4 lg:p-8">
                <div class="max-w-2xl mx-auto pb-20 lg:pb-0">
                    
                    <!-- View: Novo Lançamento -->
                    <div id="view-add-transaction" class="view hidden page-transition">
                        <h2 class="text-2xl font-bold mb-6">Novo Lançamento</h2>
                        <form id="expense-form" class="bg-[#1e293b] p-6 rounded-2xl shadow-xl space-y-5 border border-slate-800">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-xs font-semibold text-slate-400 ml-1">Data</label>
                                    <input type="date" id="date" required class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-semibold text-slate-400 ml-1">Valor (R$)</label>
                                    <input type="number" id="amount" step="0.01" required placeholder="0,00" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-semibold text-slate-400 ml-1">Título</label>
                                <input type="text" id="title" required placeholder="Ex: Mercado" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-xs font-semibold text-slate-400 ml-1">Pessoa</label>
                                    <select id="person-select" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white appearance-none cursor-pointer"></select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-semibold text-slate-400 ml-1">Tipo</label>
                                    <select id="type" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white appearance-none cursor-pointer">
                                        <option value="debit">Débito (Gasto)</option>
                                        <option value="credit">Crédito (Entrada)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-semibold text-slate-400 ml-1">Descrição</label>
                                <textarea id="description" rows="3" placeholder="Informações adicionais..." class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white resize-none"></textarea>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-white transition-all shadow-lg shadow-blue-900/20 active:scale-[0.98]">
                                Confirmar Lançamento
                            </button>
                        </form>
                    </div>

                    <!-- View: Histórico -->
                    <div id="view-history" class="view hidden page-transition">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                            <h2 class="text-2xl font-bold">Histórico</h2>
                            <div class="flex items-center gap-2 bg-[#1e293b] px-3 py-1 rounded-xl border border-slate-700 w-full sm:w-auto">
                                <span class="text-xs text-slate-400">Filtrar:</span>
                                <input type="date" id="filter-date" class="bg-transparent border-none text-sm outline-none text-blue-400 cursor-pointer flex-1">
                                <button onclick="clearFilter()" class="text-xs text-slate-500 hover:text-white">Limpar</button>
                            </div>
                        </div>
                        <div id="entries-list" class="space-y-4"></div>
                    </div>

                    <!-- View: Resumo -->
                    <div id="view-summary" class="view hidden page-transition">
                        <h2 class="text-2xl font-bold mb-6">Gastos por Pessoa</h2>
                        <div id="summary-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                    </div>

                    <!-- View: Pessoas -->
                    <div id="view-persons" class="view hidden page-transition">
                        <h2 class="text-2xl font-bold mb-6 text-white">Gerenciar Pessoas</h2>
                        <div class="bg-[#1e293b] p-6 rounded-2xl border border-slate-800 mb-6 shadow-xl">
                            <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">Adicionar Nova Pessoa</label>
                            <div class="flex gap-2">
                                <input type="text" id="person-input" placeholder="Nome da pessoa" class="flex-1 bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                                <button onclick="addPerson()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold hover:bg-blue-500 transition-all text-xl">+</button>
                            </div>
                        </div>
                        <div id="persons-list" class="space-y-3"></div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-medium opacity-0 pointer-events-none transition-all duration-300 z-[100] text-center">
        Sucesso!
    </div>

    <script src="app.js"></script>
</body>
</html>
